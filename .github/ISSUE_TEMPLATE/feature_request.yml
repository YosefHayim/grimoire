name: Feature Request
description: Suggest a new feature for grimoire
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What are you trying to do that you can't?
      placeholder: I'm trying to create a wizard that needs to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Include config examples if applicable.
      placeholder: |
        It would be great if I could write:
        ```yaml
        steps:
          - id: example
            type: my-new-type
            ...
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      description: Which part of grimoire does this affect?
      options:
        - Config format (new step types, options, etc.)
        - CLI commands or flags
        - Programmatic API
        - Theming / visual output
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
