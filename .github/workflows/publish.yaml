name: Publish

# Automatically publishes to npm and creates a GitHub Release
# when package.json version is bumped on main.
#
# How it works:
#   1. On every push to main, compares package.json version against the latest git tag.
#   2. If the version is NEW (no matching tag exists), it runs the full pipeline:
#      typecheck → test → build → git tag → GitHub Release → npm publish.
#   3. If the version already has a tag, the workflow exits early (no-op).
#
# Authentication: Uses npm Trusted Publishing (OIDC).
#   No NPM_TOKEN secret needed. One-time setup on npmjs.com:
#   1. Go to package Settings → Configure Trusted Publishing.
#   2. Add this repository (YosefHayim/grimoire) and workflow (publish.yml).
#   3. The id-token:write permission + --provenance flag handle the rest.
#
# To trigger a release:
#   1. Bump version in package.json (and cli.ts .version() if applicable).
#   2. Update CHANGELOG.md with the new version's changes.
#   3. Commit and push to main. The workflow handles the rest.

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PACKAGE_VERSION}"
          echo "version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Version ${PACKAGE_VERSION} already tagged. Skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: ${PACKAGE_VERSION}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Use Node.js 22
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for Trusted Publishing
        if: steps.version.outputs.changed == 'true'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Type check
        if: steps.version.outputs.changed == 'true'
        run: npx tsc --noEmit

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npx vitest run

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npx tsup

      - name: Validate example configs
        if: steps.version.outputs.changed == 'true'
        run: |
          for f in examples/yaml/*.yaml examples/json/*.json; do
            node dist/cli.js validate "$f"
          done

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
